
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UWC Task Board</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>UWC Task Board</h1>
<p>Post requests. Tap Share/Obtain to jump to WhatsApp.</p>
<div id="stats-bar" style="background: #1e1e1e; padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px border #333; display: flex; justify-content: space-around; text-align: center;">
  <div>
    <div style="font-size: 0.9rem; color: #888;">Wishes Granted</div>
    <div id="granted-count" style="font-size: 1.5rem; font-weight: bold; color: #4CAF50;">0</div>
  </div>
  <div style="border-left: 1px solid #333;"></div>
  <div>
    <div style="font-size: 0.9rem; color: #888;">Active Requests</div>
    <div id="active-count" style="font-size: 1.5rem; font-weight: bold; color: #2196F3;">0</div>
  </div>
</div>
<h2>New Request</h2>

<div>
<label>Title</label><br>
<input id="title" placeholder="What do you need help with?" />
<br><br>

<label for="deadline">Expiration Time (Deadline)</label><br>
<input type="datetime-local" id="deadline" required />
<br><br>

<label>Upload Image (Optional)</label><br>
<input type="file" id="image_file" accept="image/*" style="width: 100%; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 8px;" /><br><br>

<label>Description (Optional)</label><br>
<textarea id="description" placeholder="More details about your request..." rows="3" style="width: 100%; background: #222; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 8px; margin-bottom: 15px;"></textarea><br>

<label>Prize</label><br>
<input id="prize" placeholder="e.g. 5 USD / coffee" />
<br><br>

<label>Contact (WhatsApp number, optional)</label><br>
<input id="contact" placeholder="+506..." />
<br><br>

<button id="post">Post</button>
<div id="msg" style="color: #ff4d4d; margin: 10px 0; font-weight: bold;"></div>
<button id="refresh">Refresh</button>
</div>

<h2>Requests</h2>
<div id="list"></div>

<script type="module" src="app.js"></script>
</body>
</html>
